<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>月間日報</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日報">
<meta name="theme-color" content="#161b22">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
      --bg: #0d1117;
          --surface: #161b22;
              --surface2: #21262d;
                  --border: #30363d;
                      --accent: #58a6ff;
                          --accent2: #f78166;
                              --accent3: #56d364;
                                  --text: #e6edf3;
                                      --text2: #8b949e;
                                          --sun: #f78166;
                                              --sat: #58a6ff;
                                                  --holiday-bg: rgba(247,129,102,0.08);
                                                      --sat-bg: rgba(88,166,255,0.08);
                                                        }

                                                          * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

                                                            body {
                                                                font-family: 'Noto Sans JP', sans-serif;
                                                                    background: var(--bg);
                                                                        color: var(--text);
                                                                            min-height: 100vh;
                                                                                padding-bottom: 80px;
                                                                                  }

                                                                                    /* ===== HEADER ===== */
                                                                                      .header {
                                                                                          background: var(--surface);
                                                                                              border-bottom: 1px solid var(--border);
                                                                                                  padding: 16px;
                                                                                                      position: sticky;
                                                                                                          top: 0;
                                                                                                              z-index: 100;
                                                                                                                  display: flex;
                                                                                                                      align-items: center;
                                                                                                                          justify-content: space-between;
                                                                                                                            }
                                                                                                                              .header-title {
                                                                                                                                  font-size: 15px;
                                                                                                                                      font-weight: 700;
                                                                                                                                          letter-spacing: 0.05em;
                                                                                                                                              color: var(--text);
                                                                                                                                                }
                                                                                                                                                  .header-sub {
                                                                                                                                                      font-family: 'Share Tech Mono', monospace;
                                                                                                                                                          font-size: 11px;
                                                                                                                                                              color: var(--text2);
                                                                                                                                                                  margin-top: 2px;
                                                                                                                                                                    }
                                                                                                                                                                      .month-nav {
                                                                                                                                                                          display: flex;
                                                                                                                                                                              align-items: center;
                                                                                                                                                                                  gap: 12px;
                                                                                                                                                                                    }
                                                                                                                                                                                      .month-btn {
                                                                                                                                                                                          background: var(--surface2);
                                                                                                                                                                                              border: 1px solid var(--border);
                                                                                                                                                                                                  color: var(--text);
                                                                                                                                                                                                      width: 32px;
                                                                                                                                                                                                          height: 32px;
                                                                                                                                                                                                              border-radius: 8px;
                                                                                                                                                                                                                  cursor: pointer;
                                                                                                                                                                                                                      font-size: 16px;
                                                                                                                                                                                                                          display: flex;
                                                                                                                                                                                                                              align-items: center;
                                                                                                                                                                                                                                  justify-content: center;
                                                                                                                                                                                                                                      transition: background 0.15s;
                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                          .month-btn:active { background: var(--border); }
                                                                                                                                                                                                                                            .month-label {
                                                                                                                                                                                                                                                font-family: 'Share Tech Mono', monospace;
                                                                                                                                                                                                                                                    font-size: 14px;
                                                                                                                                                                                                                                                        color: var(--accent);
                                                                                                                                                                                                                                                            min-width: 70px;
                                                                                                                                                                                                                                                                text-align: center;
                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                    /* ===== SUMMARY BAR ===== */
                                                                                                                                                                                                                                                                      .summary {
                                                                                                                                                                                                                                                                          display: grid;
                                                                                                                                                                                                                                                                              grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
                                                                                                                                                                                                                                                                                  gap: 1px;
                                                                                                                                                                                                                                                                                      background: var(--border);
                                                                                                                                                                                                                                                                                          border-bottom: 1px solid var(--border);
                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                              .summary-item {
                                                                                                                                                                                                                                                                                                  background: var(--surface);
                                                                                                                                                                                                                                                                                                      padding: 8px 6px;
                                                                                                                                                                                                                                                                                                          text-align: center;
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                              .summary-label {
                                                                                                                                                                                                                                                                                                                  font-size: 9px;
                                                                                                                                                                                                                                                                                                                      color: var(--text2);
                                                                                                                                                                                                                                                                                                                          letter-spacing: 0.02em;
                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                              .summary-value {
                                                                                                                                                                                                                                                                                                                                  font-family: 'Share Tech Mono', monospace;
                                                                                                                                                                                                                                                                                                                                      font-size: 13px;
                                                                                                                                                                                                                                                                                                                                          font-weight: 700;
                                                                                                                                                                                                                                                                                                                                              color: var(--accent3);
                                                                                                                                                                                                                                                                                                                                                  margin-top: 2px;
                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                      .summary-value.yen::before { content: '¥'; font-size: 10px; }

                                                                                                                                                                                                                                                                                                                                                        /* ===== DAY LIST ===== */
                                                                                                                                                                                                                                                                                                                                                          .day-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }

                                                                                                                                                                                                                                                                                                                                                            .day-card {
                                                                                                                                                                                                                                                                                                                                                                background: var(--surface);
                                                                                                                                                                                                                                                                                                                                                                    border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                                                            overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                                                transition: border-color 0.15s;
                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                    .day-card.is-sunday { background: var(--holiday-bg); border-color: rgba(247,129,102,0.25); }
                                                                                                                                                                                                                                                                                                                                                                                      .day-card.is-saturday { background: var(--sat-bg); border-color: rgba(88,166,255,0.2); }
                                                                                                                                                                                                                                                                                                                                                                                        .day-card.is-today { border-color: var(--accent); }

                                                                                                                                                                                                                                                                                                                                                                                          .day-header {
                                                                                                                                                                                                                                                                                                                                                                                              display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                  align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                      padding: 8px 12px;
                                                                                                                                                                                                                                                                                                                                                                                                          gap: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                              cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                  user-select: none;
                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                      .day-num {
                                                                                                                                                                                                                                                                                                                                                                                                                          font-family: 'Share Tech Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                                                                              font-size: 18px;
                                                                                                                                                                                                                                                                                                                                                                                                                                  font-weight: 700;
                                                                                                                                                                                                                                                                                                                                                                                                                                      min-width: 28px;
                                                                                                                                                                                                                                                                                                                                                                                                                                          color: var(--text);
                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                              .day-name {
                                                                                                                                                                                                                                                                                                                                                                                                                                                  font-size: 11px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                      font-weight: 700;
                                                                                                                                                                                                                                                                                                                                                                                                                                                          min-width: 18px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                              .day-name.sun { color: var(--sun); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                .day-name.sat { color: var(--sat); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .day-name.week { color: var(--text2); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .day-today-badge {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        background: var(--accent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: #000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-size: 9px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-weight: 700;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 1px 5px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                letter-spacing: 0.05em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .day-summary {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        flex: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    gap: 6px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .day-time-badge {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-family: 'Share Tech Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: var(--text2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: var(--surface2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    padding: 1px 5px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            white-space: nowrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .day-content-preview {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 11px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: var(--text2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            white-space: nowrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-overflow: ellipsis;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        flex: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .day-amount {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-family: 'Share Tech Mono', monospace;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-weight: 700;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: var(--accent3);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                white-space: nowrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .day-amount.zero { color: var(--text2); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .day-expand-icon {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          font-size: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              color: var(--text2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  transition: transform 0.2s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      margin-left: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .day-card.expanded .day-expand-icon { transform: rotate(180deg); }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* ===== DAY DETAIL FORM ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .day-detail {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  display: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      border-top: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          padding: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              background: var(--surface2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .day-card.expanded .day-detail { display: block; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .form-row {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        display: grid;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            grid-template-columns: 1fr 1fr;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                gap: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin-bottom: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .form-row.full { grid-template-columns: 1fr; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .form-group label {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              display: block;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  font-size: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      color: var(--text2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          letter-spacing: 0.05em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              margin-bottom: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .form-group input, .form-group textarea {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          background: var(--surface);
