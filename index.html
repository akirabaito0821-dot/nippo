<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>月間日報</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日報">
<meta name="theme-color" content="#161b22">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --accent3: #56d364;
    --text: #e6edf3;
    --text2: #8b949e;
    --sun: #f78166;
    --sat: #58a6ff;
    --holiday-bg: rgba(247,129,102,0.08);
    --sat-bg: rgba(88,166,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .month-btn:active { background: var(--border); }
  .month-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    min-width: 70px;
    text-align: center;
  }

  /* ===== SUMMARY BAR ===== */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-item {
    background: var(--surface);
    padding: 8px 6px;
    text-align: center;
  }
  .summary-label {
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 0.02em;
  }
  .summary-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent3);
    margin-top: 2px;
  }
  .summary-value.yen::before { content: '¥'; font-size: 10px; }

  /* ===== DAY LIST ===== */
  .day-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .day-card.is-sunday { background: var(--holiday-bg); border-color: rgba(247,129,102,0.25); }
  .day-card.is-saturday { background: var(--sat-bg); border-color: rgba(88,166,255,0.2); }
  .day-card.is-today { border-color: var(--accent); }

  .day-header {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .day-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    min-width: 28px;
    color: var(--text);
  }
  .day-name {
    font-size: 11px;
    font-weight: 700;
    min-width: 18px;
  }
  .day-name.sun { color: var(--sun); }
  .day-name.sat { color: var(--sat); }
  .day-name.week { color: var(--text2); }
  .day-today-badge {
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .day-summary {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
  }
  .day-time-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .day-content-preview {
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .day-amount {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent3);
    white-space: nowrap;
  }
  .day-amount.zero { color: var(--text2); }
  .day-expand-icon {
    font-size: 10px;
    color: var(--text2);
    transition: transform 0.2s;
    margin-left: 4px;
  }
  .day-card.expanded .day-expand-icon { transform: rotate(180deg); }

  /* ===== DAY DETAIL FORM ===== */
  .day-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px;
    background: var(--surface2);
  }
  .day-card.expanded .day-detail { display: block; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .form-row.full { grid-template-columns: 1fr; }

  .form-group label {
    display: block;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 8px 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: none; height: 60px; line-height: 1.5; }

  .amount-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .amount-input-wrap {
    flex: 1;
    position: relative;
  }
  .amount-input-wrap::before {
    content: '¥';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
  }
  .amount-input-wrap input {
    padding-left: 22px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
  }

  .quick-amounts {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }

  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }
  .save-btn:active { opacity: 0.8; }

  .rest-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
  }
  .rest-toggle input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--sun);
  }
  .rest-toggle span {
    font-size: 12px;
    color: var(--text2);
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 4px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  /* ===== PRINT SHEET ===== */
  .print-sheet {
    background: #fff;
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none; /* 通常は非表示、画像生成時だけ表示 */
  }
  .print-sheet.visible { display: block; }
  .print-title {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2em;
    margin-bottom: 4px;
    color: #000;
  }
  .print-meta {
    text-align: center;
    font-size: 11px;
    color: #555;
    margin-bottom: 10px;
  }
  .print-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .print-table th {
    background: #333;
    color: #fff;
    padding: 5px 4px;
    text-align: center;
    font-size: 10px;
    border: 1px solid #999;
  }
  .print-table td {
    padding: 4px 4px;
    border: 1px solid #ccc;
    text-align: center;
    color: #000;
  }
  .print-table tr.pr-rest td { background: #ffe0e0; color: #c00; }
  .print-table tr.pr-sat td { background: #e8f0ff; }
  .print-table tr.pr-sun td { background: #ffe8e8; }
  .print-table td.pr-hw { color: #b45000; font-weight: 700; }
  .print-table td.pr-pk { color: #006b00; font-weight: 700; }
  .print-table td.pr-ov { color: #c0392b; font-weight: 700; }
  .print-footer {
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
    gap: 20px;
    font-size: 12px;
    border-top: 2px solid #333;
    padding-top: 8px;
  }
  .print-footer-item { display: flex; flex-direction: column; align-items: flex-end; }
  .print-footer-label { font-size: 10px; color: #555; }
  .print-footer-value { font-size: 15px; font-weight: 700; color: #000; }

  @media print {
    body > *:not(#printArea) { display: none !important; }
    #printArea {
      display: block !important;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: #fff;
      padding: 12px;
    }
    .print-sheet { display: block !important; }
  }
  .view-panel { display: none; padding: 12px; }
  .view-panel.active { display: block; }
  .main-panel { display: block; }
  .main-panel.hidden { display: none; }

  .export-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .export-card-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.05em;
  }
  .export-table {
    width: 100%;
    font-size: 11px;
    border-collapse: collapse;
    font-family: 'Share Tech Mono', monospace;
  }
  .export-table th {
    background: var(--surface2);
    padding: 6px 8px;
    text-align: left;
    color: var(--text2);
    font-size: 10px;
    border-bottom: 1px solid var(--border);
  }
  .export-table td {
    padding: 6px 8px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    color: var(--text);
  }
  .export-table tr:last-child td { border-bottom: none; }
  .export-table tr.is-rest td { color: var(--sun); opacity: 0.7; }
  .export-table .td-amount { color: var(--accent3); text-align: right; }

  .action-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .action-btn:active { background: var(--border); }
  .action-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent3);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== SETTINGS ===== */
  .settings-section { margin-bottom: 16px; }
  .settings-title {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .settings-row {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row label { font-size: 13px; flex: 1; }
  .settings-row input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    width: 140px;
    outline: none;
    text-align: right;
  }
  .settings-row input[type="text"]:focus { border-color: var(--accent); }
</style>
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">月間日報</div>
    <div class="header-sub" id="headerSub">MONTHLY REPORT</div>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="summary">
  <div class="summary-item">
    <div class="summary-label">勤務日数</div>
    <div class="summary-value" id="workDays">0</div>
  </div>
  <div class="summary-item" style="border-left:2px solid rgba(247,129,102,0.4)">
    <div class="summary-label">⏰ 残業</div>
    <div class="summary-value" style="color:#f78166" id="totalOvertime">0分</div>
  </div>
  <div class="summary-item" style="border-left:2px solid rgba(255,193,7,0.4)">
    <div class="summary-label">🛣️ 高速代</div>
    <div class="summary-value" style="color:#ffc107" id="totalHighway">¥0</div>
  </div>
  <div class="summary-item" style="border-left:2px solid rgba(86,211,100,0.4)">
    <div class="summary-label">🅿️ 駐車場</div>
    <div class="summary-value" style="color:#56d364" id="totalParking">¥0</div>
  </div>
  <div class="summary-item" style="border-left:2px solid rgba(88,166,255,0.4)">
    <div class="summary-label">💰 合計</div>
    <div class="summary-value yen" id="totalAmount">0</div>
  </div>
</div>

<!-- MAIN: 日付リスト -->
<div class="main-panel" id="mainPanel">
  <div class="day-list" id="dayList"></div>
</div>

<!-- EXPORT VIEW -->
<div class="view-panel" id="exportPanel">
  <div class="export-card">
    <div class="export-card-header">📋 月間サマリー</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)">
      <div style="background:var(--surface);padding:10px;text-align:center">
        <div style="font-size:10px;color:#f78166">⏰ 残業合計</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:#f78166;margin-top:2px" id="exportOvTotal">0分</div>
      </div>
      <div style="background:var(--surface);padding:10px;text-align:center">
        <div style="font-size:10px;color:#ffc107">🛣️ 高速代合計</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:#ffc107;margin-top:2px" id="exportHighwayTotal">¥0</div>
      </div>
      <div style="background:var(--surface);padding:10px;text-align:center">
        <div style="font-size:10px;color:#56d364">🅿️ 駐車場代合計</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:#56d364;margin-top:2px" id="exportParkingTotal">¥0</div>
      </div>
    </div>
    <table class="export-table" id="exportTable">
      <thead>
        <tr>
          <th>日</th>
          <th>曜</th>
          <th>時間</th>
          <th>場所</th>
          <th>内容</th>
          <th style="text-align:right;color:#f78166">残業</th>
          <th style="text-align:right;color:#ffc107">高速</th>
          <th style="text-align:right;color:#56d364">駐車</th>
        </tr>
      </thead>
      <tbody id="exportTbody"></tbody>
    </table>
  </div>
  <button class="action-btn primary" onclick="copyAsText()">📋 テキストでコピー</button>
  <button class="action-btn" style="background:#25d366;color:#fff;border-color:#25d366;font-weight:700" onclick="saveAsImage()">📸 画像保存／LINE送信</button>
  <button class="action-btn" style="background:#1565c0;color:#fff;border-color:#1565c0;font-weight:700" onclick="printSheet()">📄 PDF出力／印刷</button>
  <button class="action-btn" onclick="downloadCSV()">💾 CSVダウンロード</button>

  <!-- 社長へのメッセージ -->
  <div style="background:var(--surface);border:1px solid rgba(88,166,255,0.4);border-radius:10px;overflow:hidden;margin-top:4px;">
    <div style="background:var(--surface2);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
      <span style="font-size:14px">✉️</span>
      <span style="font-size:12px;font-weight:700;color:var(--accent);letter-spacing:0.03em">江添社長への報告事項やメッセージ</span>
    </div>
    <div style="padding:10px;">
      <textarea id="presidentMsg"
        placeholder="報告事項やメッセージを入力してください（任意）&#10;印刷・画像・テキストコピーに反映されます"
        style="width:100%;height:100px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.6;resize:vertical;outline:none;"
        oninput="savePresidentMsg()"
      ></textarea>
    </div>
  </div>
</div>

<!-- 印刷・画像用シート（画面外に配置） -->
<div id="printArea" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;overflow-y:auto;padding:12px;" onclick="if(event.target===this)this.style.display='none'">
  <div style="max-width:900px;margin:0 auto;">
    <div style="text-align:right;margin-bottom:6px">
      <button onclick="document.getElementById('printArea').style.display='none'" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;">✕ 閉じる</button>
    </div>
    <div class="print-sheet visible" id="printSheet"></div>
  </div>
</div>

<!-- SETTINGS VIEW -->
<div class="view-panel" id="settingsPanel">
  <div class="settings-section">
    <div class="settings-title">👤 氏名</div>
    <div class="settings-card">
      <div class="settings-row">
        <label>氏名</label>
        <input type="text" id="staffName" placeholder="例：山田 太郎">
      </div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">基本情報</div>
    <div class="settings-card">

  <div class="settings-section">

    <div class="settings-card">

      </div>
      <div class="settings-row">
        <label>場所2</label>
        <input type="text" id="place2" placeholder="例：大ビル">
      </div>
      <div class="settings-row">
        <label>場所3</label>
        <input type="text" id="place3" placeholder="例：">
      </div>
    </div>
  </div>
  <div class="settings-section">

    <div class="settings-card">
      <div class="settings-row">
        <label>金額1</label>

        <input type="text" id="hw2" placeholder="750" inputmode="numeric">
      </div>
      <div class="settings-row">
        <label>金額3</label>
        <input type="text" id="hw3" placeholder="" inputmode="numeric">
      </div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">🅿️ 駐車場代クイックボタン</div>
    <div class="settings-card">
      <div class="settings-row">
        <label>金額1</label>
        <input type="text" id="pk1" placeholder="500" inputmode="numeric">
      </div>
      <div class="settings-row">
        <label>金額2</label>
        <input type="text" id="pk2" placeholder="300" inputmode="numeric">
      </div>
      <div class="settings-row">
        <label>金額3</label>
        <input type="text" id="pk3" placeholder="" inputmode="numeric">
      </div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">標準時間</div>
    <div class="settings-card">
      <div class="settings-row">
        <label>開始</label>
        <input type="text" id="defTimeStart" placeholder="8">
      </div>
      <div class="settings-row">
        <label>終了（定時）</label>
        <input type="text" id="defTimeEnd" placeholder="17">
      </div>
      <div class="settings-row">
        <label>定時終業時刻</label>
        <input type="text" id="defOvertime" placeholder="17" inputmode="numeric">
      </div>
    </div>
  </div>
  <button class="action-btn primary" onclick="saveSettings()">✓ 設定を保存</button>
  <button class="action-btn" onclick="clearAllData()" style="color:var(--sun);border-color:rgba(247,129,102,0.3)">🗑️ 全データ消去</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navMain" onclick="showPanel('main')">
    <span class="nav-icon">📅</span>
    <span>入力</span>
  </button>
  <button class="nav-btn" id="navExport" onclick="showPanel('export')">
    <span class="nav-icon">📊</span>
    <span>一覧</span>
  </button>
  <button class="nav-btn" id="navSettings" onclick="showPanel('settings')">
    <span class="nav-icon">⚙️</span>
    <span>設定</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let currentYear, currentMonth;
let data = {}; // data[YYYY-MM-DD] = { timeStart, timeEnd, place, content, highway, parking, isRest }
let settings = {
  staffName: '',
  places: ['森永', '大ビル', ''],
  highwayAmounts: ['1080', '750', ''],
  parkingAmounts: ['500', '300', ''],
  defTimeStart: '8',
  defTimeEnd: '17',
  defOvertime: '17'
};

const DAY_NAMES = ['日','月','火','水','木','金','土'];

function storageKey(y, m) { return `schedule_${y}_${String(m).padStart(2,'0')}`; }

function loadData() {
  const key = storageKey(currentYear, currentMonth);
  const raw = localStorage.getItem(key);
  data = raw ? JSON.parse(raw) : {};
}

function saveData() {
  const key = storageKey(currentYear, currentMonth);
  localStorage.setItem(key, JSON.stringify(data));
}

function loadSettings() {
  const raw = localStorage.getItem('schedule_settings');
  if (raw) settings = { ...settings, ...JSON.parse(raw) };
}

function saveSettings() {
  settings.staffName = document.getElementById('staffName').value;
  settings.places = [
    document.getElementById('place1').value,
    document.getElementById('place2').value,
    document.getElementById('place3').value,
  ];
  settings.highwayAmounts = [
    document.getElementById('hw1').value,
    document.getElementById('hw2').value,
    document.getElementById('hw3').value,
  ];
  settings.parkingAmounts = [
    document.getElementById('pk1').value,
    document.getElementById('pk2').value,
    document.getElementById('pk3').value,
  ];
  settings.defTimeStart = document.getElementById('defTimeStart').value || '8';
  settings.defTimeEnd = document.getElementById('defTimeEnd').value || '17';
  settings.defOvertime = document.getElementById('defOvertime').value || '17';
  localStorage.setItem('schedule_settings', JSON.stringify(settings));
  toast('設定を保存しました');
}

function applySettingsToForm() {
  document.getElementById('staffName').value = settings.staffName || '';
  document.getElementById('place1').value = settings.places[0] || '';
  document.getElementById('place2').value = settings.places[1] || '';
  document.getElementById('place3').value = settings.places[2] || '';
  document.getElementById('hw1').value = settings.highwayAmounts[0] || '';
  document.getElementById('hw2').value = settings.highwayAmounts[1] || '';
  document.getElementById('hw3').value = settings.highwayAmounts[2] || '';
  document.getElementById('pk1').value = settings.parkingAmounts[0] || '';
  document.getElementById('pk2').value = settings.parkingAmounts[1] || '';
  document.getElementById('pk3').value = settings.parkingAmounts[2] || '';
  document.getElementById('defTimeStart').value = settings.defTimeStart || '';
  document.getElementById('defTimeEnd').value = settings.defTimeEnd || '';
  document.getElementById('defOvertime').value = settings.defOvertime || '';
}

// ===== 残業計算 =====
function calcOvertimeMinutes(timeEnd, timeStart) {
  const defEnd = parseFloat(settings.defOvertime) || 17;
  const end = parseFloat(timeEnd);
  if (isNaN(end) || end <= defEnd) return 0;
  return Math.round((end - defEnd) * 60);
}

function calcOvertimeStr(timeEnd, timeStart) {
  const mins = calcOvertimeMinutes(timeEnd, timeStart);
  if (mins <= 0) return '0分';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? (m > 0 ? `${h}時間${m}分` : `${h}時間`) : `${m}分`;
}

function updateOvertime(key) {
  const te = document.getElementById(`te-${key}`)?.value;
  const ts = document.getElementById(`ts-${key}`)?.value;
  const el = document.getElementById(`overtimeDisp-${key}`);
  if (el) el.textContent = calcOvertimeStr(te, ts);
}

function savePresidentMsg() {
  const msg = document.getElementById('presidentMsg').value;
  localStorage.setItem(`presidentMsg_${currentYear}_${String(currentMonth).padStart(2,'0')}`, msg);
}

function loadPresidentMsg() {
  const key = `presidentMsg_${currentYear}_${String(currentMonth).padStart(2,'0')}`;
  const msg = localStorage.getItem(key) || '';
  const el = document.getElementById('presidentMsg');
  if (el) el.value = msg;
}

// ===== DATE UTILS =====
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function dayOfWeek(y, m, d) { return new Date(y, m-1, d).getDay(); }
function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
function dateKey(d) {
  return `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ===== RENDER =====
function render() {
  document.getElementById('monthLabel').textContent =
    `${currentYear}/${String(currentMonth).padStart(2,'0')}`;
  // ヘッダーに氏名表示
  document.getElementById('headerSub').textContent =
    settings.staffName ? `${settings.staffName}　の日報` : 'MONTHLY REPORT';

  const days = daysInMonth(currentYear, currentMonth);
  const today = todayStr();
  let workDays = 0, totalHighway = 0, totalParking = 0, totalOvertimeMins = 0, restDays = 0;

  const list = document.getElementById('dayList');
  list.innerHTML = '';

  for (let d = 1; d <= days; d++) {
    const key = dateKey(d);
    const rec = data[key] || {};
    const dow = dayOfWeek(currentYear, currentMonth, d);
    const isSun = dow === 0, isSat = dow === 6;
    const isToday = key === today;
    const isRest = rec.isRest || false;
    const hw = parseInt(rec.highway) || 0;
    const pk = parseInt(rec.parking) || 0;
    const dayTotal = hw + pk;

    if (!isRest && !isSun && (rec.content || rec.place)) {
      workDays++; totalHighway += hw; totalParking += pk;
      totalOvertimeMins += calcOvertimeMinutes(rec.timeEnd, rec.timeStart);
    }
    if (isRest || (isSun && !rec.content)) { restDays++; }

    let cardClass = 'day-card';
    if (isSun) cardClass += ' is-sunday';
    if (isSat) cardClass += ' is-saturday';
    if (isToday) cardClass += ' is-today';

    const dowName = DAY_NAMES[dow];
    const dowClass = isSun ? 'sun' : isSat ? 'sat' : 'week';

    const timeStr = rec.timeStart && rec.timeEnd
      ? `${rec.timeStart}〜${rec.timeEnd}`
      : (rec.timeStart ? `${rec.timeStart}〜` : '');

    const amtDisplay = isRest ? '休' :
      (dayTotal > 0 ? `¥${dayTotal.toLocaleString()}` : ((hw===0&&pk===0&&(rec.highway!==undefined||rec.parking!==undefined)) ? '¥0' : ''));
    const amtClass = (dayTotal === 0 && (rec.highway !== undefined || rec.parking !== undefined)) ? 'day-amount zero' : 'day-amount';

    const card = document.createElement('div');
    card.className = cardClass;
    card.id = `card-${key}`;
    card.innerHTML = `
      <div class="day-header" onclick="toggleCard('${key}')">
        <div class="day-num">${d}</div>
        <div class="day-name ${dowClass}">${dowName}</div>
        ${isToday ? '<div class="day-today-badge">TODAY</div>' : ''}
        <div class="day-summary">
          ${timeStr ? `<div class="day-time-badge">${timeStr}</div>` : ''}
          <div class="day-content-preview">${isRest ? '休日' : (rec.content || (rec.place || ''))}</div>
          <div class="${amtClass}">${amtDisplay}</div>
        </div>
        <span class="day-expand-icon">▼</span>
      </div>
      <div class="day-detail" id="detail-${key}">
        <label class="rest-toggle">
          <input type="checkbox" id="rest-${key}" ${isRest?'checked':''} onchange="toggleRest('${key}')">
          <span>🏖️ 休日にする</span>
        </label>
        <div id="workfields-${key}" style="${isRest?'display:none':''}">
          <div class="form-row">
            <div class="form-group">
              <label>開始時間</label>
              <input type="number" id="ts-${key}" value="${rec.timeStart||settings.defTimeStart}" placeholder="${settings.defTimeStart}" inputmode="numeric" onchange="updateOvertime('${key}')">
            </div>
            <div class="form-group">
              <label>終了時間</label>
              <input type="number" id="te-${key}" value="${rec.timeEnd||settings.defTimeEnd}" placeholder="${settings.defTimeEnd}" inputmode="numeric" onchange="updateOvertime('${key}')">
            </div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:var(--text2)">⏰ 残業時間</span>
            <span style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:#f78166" id="overtimeDisp-${key}">${calcOvertimeStr(rec.timeEnd, rec.timeStart)}</span>
          </div>
          <div class="form-row full">
            <div class="form-group">
              <label>場所／相手</label>
              <input type="text" id="place-${key}" value="${rec.place||''}" placeholder="例：森永">
              <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">
                ${settings.places.filter(p=>p).map(p=>`<button class="quick-btn" onclick="setPlace('${key}','${p}')">${p}</button>`).join('')}
              </div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-group">
              <label>内容</label>
              <textarea id="content-${key}" placeholder="例：ラック">${rec.content||''}</textarea>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>🛣️ 高速道路代</label>
              <div class="amount-input-wrap">
                <input type="number" id="highway-${key}" value="${rec.highway||''}" placeholder="0" inputmode="numeric">
              </div>
              <div class="quick-amounts" style="margin-top:4px">
                ${settings.highwayAmounts.filter(a=>a!==undefined&&a!=='').map(a=>`<button class="quick-btn" onclick="document.getElementById('highway-${key}').value='${a}'">¥${parseInt(a)||0}</button>`).join('')}
              </div>
            </div>
            <div class="form-group">
              <label>🅿️ 駐車場代</label>
              <div class="amount-input-wrap">
                <input type="number" id="parking-${key}" value="${rec.parking||''}" placeholder="0" inputmode="numeric">
              </div>
              <div class="quick-amounts" style="margin-top:4px">
                ${settings.parkingAmounts.filter(a=>a!==undefined&&a!=='').map(a=>`<button class="quick-btn" onclick="document.getElementById('parking-${key}').value='${a}'">¥${parseInt(a)||0}</button>`).join('')}
              </div>
            </div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:var(--text2)">この日の小計</span>
            <span style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:var(--accent3)" id="dayTotal-${key}">¥0</span>
          </div>
        </div>
        <button class="save-btn" onclick="saveDay('${key}')">保存</button>
      </div>
    `;
    list.appendChild(card);

    // 小計リアルタイム更新
    ['highway', 'parking'].forEach(t => {
      const el = document.getElementById(`${t}-${key}`);
      if (el) el.addEventListener('input', () => updateDayTotal(key));
    });
    // 初期小計表示
    updateDayTotal(key);
  }

  document.getElementById('workDays').textContent = workDays;
  const oh = Math.floor(totalOvertimeMins / 60), om = totalOvertimeMins % 60;
  document.getElementById('totalOvertime').textContent =
    totalOvertimeMins === 0 ? '0分' : (oh > 0 ? (om > 0 ? `${oh}h${om}m` : `${oh}h`) : `${om}分`);
  document.getElementById('totalHighway').textContent = `¥${totalHighway.toLocaleString()}`;
  document.getElementById('totalParking').textContent = `¥${totalParking.toLocaleString()}`;
  document.getElementById('totalAmount').textContent = (totalHighway + totalParking).toLocaleString();
}

function toggleCard(key) {
  const card = document.getElementById(`card-${key}`);
  card.classList.toggle('expanded');
}

function toggleRest(key) {
  const isRest = document.getElementById(`rest-${key}`).checked;
  document.getElementById(`workfields-${key}`).style.display = isRest ? 'none' : '';
}

function setPlace(key, val) {
  document.getElementById(`place-${key}`).value = val;
}

function updateDayTotal(key) {
  const hw = parseInt(document.getElementById(`highway-${key}`)?.value) || 0;
  const pk = parseInt(document.getElementById(`parking-${key}`)?.value) || 0;
  const el = document.getElementById(`dayTotal-${key}`);
  if (el) el.textContent = `¥${(hw + pk).toLocaleString()}`;
}

function saveDay(key) {
  const isRest = document.getElementById(`rest-${key}`).checked;
  if (isRest) {
    data[key] = { isRest: true };
  } else {
    data[key] = {
      timeStart: document.getElementById(`ts-${key}`).value,
      timeEnd: document.getElementById(`te-${key}`).value,
      place: document.getElementById(`place-${key}`).value,
      content: document.getElementById(`content-${key}`).value,
      highway: document.getElementById(`highway-${key}`).value,
      parking: document.getElementById(`parking-${key}`).value,
      overtime: calcOvertimeMinutes(
        document.getElementById(`te-${key}`).value,
        document.getElementById(`ts-${key}`).value
      ),
      isRest: false
    };
  }
  saveData();
  render();
  setTimeout(() => {
    const card = document.getElementById(`card-${key}`);
    if (card) card.classList.remove('expanded');
  }, 100);
  toast('保存しました ✓');
}

// ===== MONTH NAV =====
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  loadData();
  render();
  loadPresidentMsg();
}

// ===== PANELS =====
function showPanel(name) {
  document.getElementById('mainPanel').classList.toggle('hidden', name !== 'main');
  document.getElementById('exportPanel').classList.toggle('active', name === 'export');
  document.getElementById('settingsPanel').classList.toggle('active', name === 'settings');
  document.getElementById('navMain').classList.toggle('active', name === 'main');
  document.getElementById('navExport').classList.toggle('active', name === 'export');
  document.getElementById('navSettings').classList.toggle('active', name === 'settings');

  if (name === 'export') { renderExport(); loadPresidentMsg(); }
  if (name === 'settings') applySettingsToForm();
}

// ===== EXPORT =====
function renderExport() {
  const days = daysInMonth(currentYear, currentMonth);
  const tbody = document.getElementById('exportTbody');
  tbody.innerHTML = '';
  let totalHw = 0, totalPk = 0, totalOvMins = 0;
  for (let d = 1; d <= days; d++) {
    const key = dateKey(d);
    const rec = data[key] || {};
    const dow = dayOfWeek(currentYear, currentMonth, d);
    const hw = parseInt(rec.highway) || 0;
    const pk = parseInt(rec.parking) || 0;
    const ovMins = rec.isRest ? 0 : calcOvertimeMinutes(rec.timeEnd, rec.timeStart);
    if (!rec.isRest) { totalHw += hw; totalPk += pk; totalOvMins += ovMins; }
    const tr = document.createElement('tr');
    if (rec.isRest || dow === 0) tr.className = 'is-rest';
    const timeStr = rec.timeStart && rec.timeEnd ? `${rec.timeStart}〜${rec.timeEnd}` : '';
    const hwDisplay = rec.isRest ? '' : (rec.highway ? `¥${hw.toLocaleString()}` : '');
    const pkDisplay = rec.isRest ? '' : (rec.parking ? `¥${pk.toLocaleString()}` : '');
    const ovDisplay = (!rec.isRest && ovMins > 0) ? calcOvertimeStr(rec.timeEnd, rec.timeStart) : '';
    tr.innerHTML = `
      <td>${d}</td>
      <td>${DAY_NAMES[dow]}</td>
      <td>${timeStr}</td>
      <td>${rec.place||''}</td>
      <td>${rec.isRest ? '休日' : (rec.content||'')}</td>
      <td class="td-amount" style="color:#f78166">${ovDisplay}</td>
      <td class="td-amount" style="color:#ffc107">${hwDisplay}</td>
      <td class="td-amount" style="color:#56d364">${pkDisplay}</td>
    `;
    tbody.appendChild(tr);
  }
  document.getElementById('exportHighwayTotal').textContent = `¥${totalHw.toLocaleString()}`;
  document.getElementById('exportParkingTotal').textContent = `¥${totalPk.toLocaleString()}`;
  const oh = Math.floor(totalOvMins/60), om = totalOvMins%60;
  document.getElementById('exportOvTotal').textContent =
    totalOvMins===0 ? '0分' : (oh>0?(om>0?`${oh}時間${om}分`:`${oh}時間`):`${om}分`);
}

function copyAsText() {
  const days = daysInMonth(currentYear, currentMonth);
  let lines = [`【${currentYear}年${currentMonth}月 月間日報】\n`];
  let totalHw = 0, totalPk = 0, totalOvMins = 0;
  for (let d = 1; d <= days; d++) {
    const key = dateKey(d);
    const rec = data[key] || {};
    const dow = DAY_NAMES[dayOfWeek(currentYear, currentMonth, d)];
    if (rec.isRest) {
      lines.push(`${currentMonth}/${d}(${dow}) 休日`);
    } else if (rec.content || rec.place) {
      const hw = parseInt(rec.highway) || 0;
      const pk = parseInt(rec.parking) || 0;
      const ovMins = calcOvertimeMinutes(rec.timeEnd, rec.timeStart);
      totalHw += hw; totalPk += pk; totalOvMins += ovMins;
      const timeStr = rec.timeStart && rec.timeEnd ? ` ${rec.timeStart}〜${rec.timeEnd}` : '';
      const hwStr = hw > 0 ? ` 高速:¥${hw.toLocaleString()}` : '';
      const pkStr = pk > 0 ? ` 駐車:¥${pk.toLocaleString()}` : '';
      const ovStr = ovMins > 0 ? ` 残業:${calcOvertimeStr(rec.timeEnd, rec.timeStart)}` : '';
      lines.push(`${currentMonth}/${d}(${dow})${timeStr} ${rec.place||''} ${rec.content||''}${ovStr}${hwStr}${pkStr}`);
    }
  }
  const ovH = Math.floor(totalOvMins/60), ovM = totalOvMins%60;
  const ovTotal = totalOvMins===0?'0分':(ovH>0?(ovM>0?`${ovH}時間${ovM}分`:`${ovH}時間`):`${ovM}分`);
  lines.push(`\n⏰ 残業合計: ${ovTotal}`);
  lines.push(`🛣️ 高速代合計: ¥${totalHw.toLocaleString()}`);
  lines.push(`🅿️ 駐車場代合計: ¥${totalPk.toLocaleString()}`);
  lines.push(`💰 合計: ¥${(totalHw+totalPk).toLocaleString()}`);
  const msg = (document.getElementById('presidentMsg')?.value || '').trim();
  if (msg) {
    lines.push(`\n【江添社長への報告事項やメッセージ】\n${msg}`);
  }
  const text = lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('コピーしました！'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('コピーしました！');
  }
}

function downloadCSV() {
  const days = daysInMonth(currentYear, currentMonth);
  const rows = [['日付','曜日','開始','終了','残業時間','場所','内容','高速道路代','駐車場代','小計']];
  for (let d = 1; d <= days; d++) {
    const key = dateKey(d);
    const rec = data[key] || {};
    const dow = DAY_NAMES[dayOfWeek(currentYear, currentMonth, d)];
    const hw = rec.isRest ? '' : (rec.highway || '');
    const pk = rec.isRest ? '' : (rec.parking || '');
    const subtotal = rec.isRest ? '' : ((parseInt(rec.highway)||0) + (parseInt(rec.parking)||0)) || '';
    const ovMins = rec.isRest ? 0 : calcOvertimeMinutes(rec.timeEnd, rec.timeStart);
    const ovStr = rec.isRest ? '' : (ovMins > 0 ? calcOvertimeStr(rec.timeEnd, rec.timeStart) : '');
    rows.push([
      `${currentMonth}/${d}`, dow,
      rec.timeStart||'', rec.timeEnd||'',
      ovStr,
      rec.place||'',
      rec.isRest ? '休日' : (rec.content||''),
      hw, pk, subtotal
    ]);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `schedule_${currentYear}_${String(currentMonth).padStart(2,'0')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSVをダウンロード');
}

function clearAllData() {
  if (confirm('全データを消去しますか？\nこの操作は元に戻せません。')) {
    Object.keys(localStorage).filter(k => k.startsWith('schedule_')).forEach(k => localStorage.removeItem(k));
    loadData(); render();
    toast('データを消去しました');
  }
}

// ===== 印刷シート生成 =====
function buildPrintSheet() {
  const days = daysInMonth(currentYear, currentMonth);
  let totalHw = 0, totalPk = 0, workDays = 0, totalOvMins = 0;
  let rows = '';

  for (let d = 1; d <= days; d++) {
    const key = dateKey(d);
    const rec = data[key] || {};
    const dow = dayOfWeek(currentYear, currentMonth, d);
    const isSun = dow === 0, isSat = dow === 6;
    const isRest = rec.isRest || false;
    const hw = parseInt(rec.highway) || 0;
    const pk = parseInt(rec.parking) || 0;
    const ovMins = isRest ? 0 : calcOvertimeMinutes(rec.timeEnd, rec.timeStart);
    const timeStr = rec.timeStart && rec.timeEnd ? `${rec.timeStart}〜${rec.timeEnd}` : '';

    let trClass = '';
    if (isRest || isSun) trClass = 'pr-rest';
    else if (isSat) trClass = 'pr-sat';

    if (!isRest && !isSun && (rec.content || rec.place)) {
      workDays++; totalHw += hw; totalPk += pk; totalOvMins += ovMins;
    }

    const dowColor = isSun ? '#c00' : isSat ? '#003cb3' : '#000';
    const hwCell = (!isRest && hw > 0) ? `¥${hw.toLocaleString()}` : '';
    const pkCell = (!isRest && pk > 0) ? `¥${pk.toLocaleString()}` : '';
    const ovCell = (!isRest && ovMins > 0) ? calcOvertimeStr(rec.timeEnd, rec.timeStart) : '';

    rows += `<tr class="${trClass}">
      <td>${d}</td>
      <td style="color:${dowColor};font-weight:700">${DAY_NAMES[dow]}</td>
      <td>${timeStr}</td>
      <td>${rec.place || ''}</td>
      <td style="text-align:left">${isRest ? '休日' : (rec.content || '')}</td>
      <td style="color:#c0392b;font-weight:700;text-align:center">${ovCell}</td>
      <td class="pr-hw">${hwCell}</td>
      <td class="pr-pk">${pkCell}</td>
    </tr>`;
  }

  const ovH = Math.floor(totalOvMins/60), ovM = totalOvMins%60;
  const ovTotalStr = totalOvMins===0?'0分':(ovH>0?(ovM>0?`${ovH}時間${ovM}分`:`${ovH}時間`):`${ovM}分`);

  const now = new Date();
  const printDate = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const staffName = settings.staffName || '';

  const msg = (document.getElementById('presidentMsg')?.value || '').trim();
  const msgBlock = msg ? `
    <div style="margin-top:14px;border:1px solid #999;border-radius:4px;overflow:hidden;">
      <div style="background:#333;color:#fff;font-size:10px;font-weight:700;padding:5px 8px;letter-spacing:0.05em;">
        ✉️ 江添社長への報告事項やメッセージ
      </div>
      <div style="padding:8px 10px;font-size:11px;line-height:1.7;white-space:pre-wrap;color:#000;">${msg}</div>
    </div>` : '';

  document.getElementById('printSheet').innerHTML = `
    <div class="print-title">月　間　日　報</div>
    <div class="print-meta">${currentYear}年 ${currentMonth}月分　${staffName ? '／ 氏名：' + staffName : ''}　／ 出力日：${printDate}</div>
    <table class="print-table">
      <thead>
        <tr>
          <th style="width:22px">日</th>
          <th style="width:20px">曜</th>
          <th style="width:55px">時間</th>
          <th style="width:70px">場所／相手</th>
          <th>内容</th>
          <th style="width:44px;color:#c0392b">残業</th>
          <th style="width:52px;color:#ffa000">高速代</th>
          <th style="width:52px;color:#2e7d32">駐車場</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="print-footer">
      <div class="print-footer-item">
        <span class="print-footer-label">勤務日数</span>
        <span class="print-footer-value">${workDays}日</span>
      </div>
      <div class="print-footer-item">
        <span class="print-footer-label">⏰ 残業合計</span>
        <span class="print-footer-value" style="color:#c0392b">${ovTotalStr}</span>
      </div>
      <div class="print-footer-item">
        <span class="print-footer-label">🛣️ 高速代合計</span>
        <span class="print-footer-value" style="color:#b45000">¥${totalHw.toLocaleString()}</span>
      </div>
      <div class="print-footer-item">
        <span class="print-footer-label">🅿️ 駐車場代合計</span>
        <span class="print-footer-value" style="color:#006b00">¥${totalPk.toLocaleString()}</span>
      </div>
      <div class="print-footer-item">
        <span class="print-footer-label">💰 月間合計</span>
        <span class="print-footer-value">¥${(totalHw+totalPk).toLocaleString()}</span>
      </div>
    </div>
    ${msgBlock}
  `;
}

// ===== 画像保存 / LINE送信 =====
async function saveAsImage() {
  toast('画像を生成中...');
  buildPrintSheet();

  const printArea = document.getElementById('printArea');
  const sheet = document.getElementById('printSheet');
  printArea.style.display = 'block';
  await new Promise(r => setTimeout(r, 600));

  try {
    const canvas = await html2canvas(sheet, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: sheet.offsetWidth,
      height: sheet.offsetHeight,
    });
    printArea.style.display = 'none';

    const fileName = `日報_${currentYear}${String(currentMonth).padStart(2,'0')}.png`;
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const file = new File([blob], fileName, { type: 'image/png' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: `${currentYear}年${currentMonth}月 日報` });
      toast('共有しました！');
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast('画像を保存しました！');
    }
  } catch(e) {
    printArea.style.display = 'none';
    if (e.name !== 'AbortError') toast('画像生成に失敗しました');
  }
}

// ===== 印刷／PDF出力 =====
async function printSheet() {
  toast('PDF を生成中...');
  buildPrintSheet();

  const printArea = document.getElementById('printArea');
  const sheet = document.getElementById('printSheet');
  printArea.style.display = 'block';

  await new Promise(r => setTimeout(r, 600));

  try {
    const canvas = await html2canvas(sheet, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: sheet.offsetWidth,
      height: sheet.offsetHeight,
    });

    printArea.style.display = 'none';

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210, pageH = 297;
    const margin = 8;
    const printW = pageW - margin * 2;
    const printH = (canvas.height / canvas.width) * printW;

    // 1ページに収まる場合はそのまま、長い場合は縮小
    const finalH = printH > pageH - margin * 2 ? pageH - margin * 2 : printH;
    const finalW = finalH === pageH - margin * 2
      ? (canvas.width / canvas.height) * finalH
      : printW;

    pdf.addImage(imgData, 'PNG', margin, margin, finalW, finalH);

    const fileName = `日報_${currentYear}${String(currentMonth).padStart(2,'0')}.pdf`;

    // Android/iOS: Web Share API でPDFを共有
    const pdfBlob = pdf.output('blob');
    const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: `${currentYear}年${currentMonth}月 日報` });
        toast('PDF を共有しました！');
        return;
      } catch(e) {
        if (e.name === 'AbortError') return;
      }
    }

    // フォールバック：ダウンロード
    pdf.save(fileName);
    toast('PDF を保存しました！');

  } catch(e) {
    printArea.style.display = 'none';
    console.error(e);
    toast('PDF 生成に失敗しました');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== INIT =====
function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  loadSettings();
  loadData();
  render();
  // 初回起動時：名前が未設定なら設定タブへ誘導
  if (!settings.staffName) {
    setTimeout(() => {
      showPanel('settings');
      toast('⚙️ まず氏名を設定してください');
    }, 600);
  }
}

init();

// Service Worker 登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
